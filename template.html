<!DOCTYPE html>
<html lang="ko">
<head>

    <!-- 세련된 폰트 적용 (구글 폰트: Noto Sans KR) - 대기업 보안망 통과 용이 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 모든 서브 페이지 공통 최적화 스타일 */
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; line-height: 1.6; color: #333; background-color: #ffffff; }
        header { background-color: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 1rem; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; box-sizing: border-box; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        
        .logo { font-size: 1.35rem; font-weight: 700; text-decoration: none; color: #16a34a; display: flex; align-items: center; }
        nav { display: flex; align-items: center; gap: 1rem; }
        nav a { color: #374151; text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 0.25rem 0.5rem; transition: color 0.2s; }
        nav a:hover { color: #16a34a; }
        
        /* 메인 콘텐츠 영역 상단 여백 (고정형 상단 바 높이 대응) */
        .main-content { margin-top: 5.5rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; box-sizing: border-box; }

        /* 하단 푸터(Footer) 스타일 */
        footer { background-color: #ffffff; border-top: 1px solid #e5e7eb; padding: 2rem 0; margin-top: 5rem; font-size: 0.85rem; color: #4b5563; }
        .footer-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 1rem; flex-wrap: wrap; gap: 1.5rem; }
        .footer-left { line-height: 1.8; }
        .footer-left a { color: #4b5563; text-decoration: none; display: inline-flex; align-items: center; margin-top: 0.5rem; }
        .footer-left a:hover { color: #16a34a; }
        .footer-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; }
        .footer-logos { display: flex; align-items: center; gap: 1rem; }
        
        /* 푸터 이미지 가시성 극대화 및 렌더링 열화 방지 */
        .footer-logos img { 
            height: 95px; 
            width: auto; 
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: crisp-edges;
        }
        .footer-powered { font-size: 0.9rem; color: #4b5563; margin-top: 0.25rem; }

        /* 반응형 모바일 레이아웃 조정 */
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 1rem; }
            .footer-container { flex-direction: column; align-items: flex-start; }
            .footer-right { text-align: left; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- [공통 헤더 영역] -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">a2MDS Consulting</a>
            <nav id="main-nav">
                <a href="index.html">Home</a>

                <a href="https://blog.naver.com/a2mds" target="_blank">[News & Insights]</a>
            </nav>
        </div>
    </header>

    <!-- 메인 본문 영역 -->
    <main class="main-content">
        <div class="container">
            
            <!-- 💡 본문 컨텐츠 시작 (이 아래 내용을 각 페이지에 맞게 변경하십시오) -->
            <h1>페이지 타이틀</h1>
            <p>이곳에 상세 서비스 안내 및 텍스트 데이터를 자유롭게 채워 넣으시면 됩니다.</p>
            <!-- 💡 본문 컨텐츠 끝 -->

        </div>

        <!-- [공통 푸터 영역] -->
        <footer>
            <div class="footer-container">
                <div class="footer-left">
                    <div>상호명: 에이투엠디에스컨설팅</div>
                    <div>사업자등록번호: 412-09-29348</div>
                    <div style="margin-top: 0.5rem;">Copyright &copy; 2026 a2MDS Consulting. All Rights Reserved.</div>
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfkdkUhTOYEsQ4-sIVn3pbIeJfbBGIBVMFSzct7E9jgxeX97A/viewform" target="_blank">📮 <strong>문의하기</strong></a>
                </div>
                
                <div class="footer-right">
                    <div class="footer-logos">
                        <img src="images/footer.jpg" alt="a2MDS & APA Engineering">
                    </div>
                    <div class="footer-powered">
                        a2MDS, powered by <strong>APA Engineering</strong>
                    </div>
                </div>
            </div>
        </footer>
    </main>

    <!-- 현재 활성화된 메뉴를 자동으로 인식해 다크 검은색 하이라이트 버튼을 씌워주는 스크립트 플러그인 -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var path = window.location.pathname.split("/").pop();
            if (!path) path = "index.html"; // 기본값 메인
            var target = document.querySelector('#main-nav a[href="' + path + '"]');
            if (target) {
                target.style.backgroundColor = "#111827";
                target.style.color = "#ffffff";
                target.style.borderRadius = "4px";
                target.style.padding = "0.25rem 0.7rem";
            }
        });
    </script>
</body>
</html>
