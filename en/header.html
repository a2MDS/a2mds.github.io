<!-- 상단 공통 헤더 컴포넌트: header.html -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../images/favicon.png" type="image/png">
<!-- 세련된 폰트 적용 (구글 폰트: Noto Sans KR & Inter) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    /* 기본 레이아웃 최적화 */
    body { 
        font-family: 'Noto Sans KR', sans-serif; 
        margin: 0; 
        padding: 0; 
        line-height: 1.6; 
        color: #333; 
        background-color: #ffffff; 
        overflow-y: scroll; /* 모든 페이지에서 메뉴 바가 뒤틀리지 않도록 스크롤바 영역 고정 */
    }
    
    /* 헤더: 우측 메뉴 배치 및 높이 프레임 최적화 */
    header { background-color: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 1.2rem 0; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; box-sizing: border-box; }
    .nav-container { display: flex; justify-content: flex-end; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1rem; box-sizing: border-box; }
    
    /* 타 페이지와 레이아웃 통일을 위해 여백 공간을 유지한 채 텍스트 비활성화 제어 양식 */
    .logo-hidden { font-size: 1.45rem; font-weight: 700; visibility: hidden; pointer-events: none; white-space: nowrap; }
    
    /* 글자 크기 일관성 확보를 위해 인라인 및 내부 스타일 단위 고정 및 패딩 수정 */
    nav { display: flex; align-items: center; gap: 1.3rem; }
    nav a { color: #374151; text-decoration: none; font-size: 15px !important; font-weight: 500; padding: 0.25rem 0.5rem; transition: color 0.2s; white-space: nowrap; }
    nav a:hover { color: #16a34a; }
    
    /* [KR] 전환 버튼 스타일 양식 */
    .lang-kr-btn { font-weight: 700; color: #2563eb !important; font-size: 15px !important; }
    .lang-kr-btn:hover { color: #1d4ed8 !important; }

    /* [Contact Us] 버튼 특별 강조 스타일 양식 추가 */
    .contact-btn { font-weight: 700; color: #16a34a !important; font-size: 15px !important; }
    .contact-btn:hover { color: #15803d !important; }

    /* 반응형 모바일 헤더 */
    @media (max-width: 768px) {
        .nav-container { flex-direction: column; gap: 1rem; align-items: flex-start; }
        .logo-hidden { display: none; }
        nav { gap: 0.5rem; flex-wrap: wrap; }
        nav a { font-size: 0.95rem !important; padding: 0.25rem 0.3rem; }
    }
</style>

<!-- 상단 메뉴 바 (우측 정렬 구조 유지) -->
<header>
    <div class="nav-container">
        <div class="logo-hidden">a2MDS Consulting</div>
        <nav id="main-nav">
            <!-- 국문 전환 링크 (상위 폴더의 about.html로 연결) -->
            <a href="../index.html" class="lang-kr-btn">[KR]</a>
            <a href="index.html">Home</a>
            <a href="contact.html" target="_blank" class="contact-btn">[Contact Us]</a>
            <a href="https://blog.naver.com/a2mds" target="_blank">[News & Insights]</a>
        </nav>
    </div>
</header>
